<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHOJIKI SH-J002 投稿管理</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="./simple.css">
<style>
  .admin-wrap { max-width: 720px; margin: 40px auto; padding: 0 20px; }
  .admin-note {
    background: #fff7e6; border: 1px solid #f3c896; color: #6a3a00;
    padding: 12px 16px; border-radius: 10px; font-size: 13px;
    margin-bottom: 24px;
  }
  .admin-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  @media (max-width: 600px) { .admin-grid { grid-template-columns: 1fr; } }
  .admin-card {
    display: block; text-decoration: none; color: inherit;
    background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 28px 24px; text-align: center;
  }
  .admin-card:hover { border-color: var(--ink); text-decoration: none; }
  .admin-card .ico { font-size: 48px; margin-bottom: 8px; }
  .admin-card h2 { margin: 0 0 6px; font-size: 18px; font-weight: 700; }
  .admin-card p { margin: 0; font-size: 12px; color: var(--ink-3); }
  .admin-quick {
    margin-top: 28px; padding-top: 20px;
    border-top: 1px solid var(--line); font-size: 13px;
  }
  .admin-quick a { color: var(--accent); text-decoration: none; margin-right: 16px; }
  .admin-quick a:hover { text-decoration: underline; }
</style>
</head>
<body class="lang-ja">

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-title">
      <span class="brand">SHOJIKI</span>
      <span class="sub" style="font-weight:600;color:var(--ink)">SH-J002</span>
      <span class="sub">投稿管理</span>
    </div>
    <div class="hdr-meta">
      <a href="./" style="font-size:13px">← ダッシュボードへ戻る</a>
    </div>
  </div>
</header>

<main class="admin-wrap">

  <div class="admin-note">
    🔒 このページは投稿担当者専用です。中国工場/日本エンジニアには共有しないでください。
    投稿された内容は不具合一覧/返品一覧に自動的に表示されます。
  </div>

  <div class="admin-grid">
    <a href="./admin-defect.html" class="admin-card">
      <div class="ico">🔧</div>
      <h2>不具合を投稿</h2>
      <p>顧客からの不具合報告・修理依頼の登録</p>
    </a>
    <a href="./admin-return.html" class="admin-card">
      <div class="ico">📦</div>
      <h2>返品を投稿</h2>
      <p>返品の発生記録 (理由・対応・写真)</p>
    </a>
  </div>

  <div class="admin-quick">
    <strong>クイックリンク:</strong>
    <a href="./">📊 TOP</a>
    <a href="./defects.html">🔧 不具合一覧</a>
    <a href="./returns.html">📦 返品一覧</a>
    <a href="./feedback.html">💬 お客様の声</a>
    <a href="https://github.com/eda0825-spec/shojiki-defects-j002/issues" target="_blank">GitHub Issues</a>
  </div>

</main>

</body>
</html>
