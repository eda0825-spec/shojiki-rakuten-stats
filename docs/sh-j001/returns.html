<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHOJIKI SH-J001 返品一覧</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="./simple.css">
<style>
  .issue-card {
    background: #fff; border: 1px solid var(--line);
    border-radius: 10px; padding: 18px 20px;
    margin-bottom: 12px;
  }
  .issue-card .head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .issue-card h3 { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
  .issue-card .head-meta {
    font-size: 11px; color: var(--ink-3); white-space: nowrap;
    display: flex; gap: 10px; align-items: center;
  }
  .issue-tag {
    background: #f0f0f3; color: var(--ink-2);
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
  }
  .issue-tag.status-open { background: #fff3e8; color: #8a4400; }
  .issue-tag.status-closed { background: #effaf0; color: #0f5c2b; }

  /* Inline rendered body */
  .body-md { font-size: 13px; line-height: 1.7; color: var(--ink); }
  .body-md table {
    border-collapse: collapse; margin: 8px 0;
    width: 100%; max-width: 540px;
  }
  .body-md th, .body-md td {
    border: 1px solid var(--line); padding: 6px 12px;
    text-align: left; vertical-align: top;
  }
  .body-md th { background: #f6f6f8; font-weight: 600; font-size: 12px; width: 120px; }
  .body-md td { background: #fff; }
  .body-md h2, .body-md h3 {
    font-size: 13px; font-weight: 700; margin: 12px 0 6px;
    color: var(--ink-2);
  }
  .body-md img {
    max-width: 320px; max-height: 240px; border-radius: 6px;
    border: 1px solid var(--line); margin: 6px 6px 6px 0;
    cursor: zoom-in;
  }
  .body-md video {
    max-width: 480px; max-height: 320px; border-radius: 6px;
    border: 1px solid var(--line); margin: 6px 0;
  }
  .body-md a { color: var(--accent); text-decoration: underline; word-break: break-all; }
  .body-md p { margin: 6px 0; }
  .body-md ul { margin: 6px 0; padding-left: 22px; }

  .img-lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center; z-index: 999;
    padding: 20px; cursor: zoom-out;
  }
  .img-lightbox.open { display: flex; }
  .img-lightbox img { max-width: 95vw; max-height: 95vh; }

  .summary-line {
    background: #f6f6f8; padding: 12px 18px;
    border-radius: 10px; margin-bottom: 16px;
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 14px;
  }
  .summary-line strong { font-size: 20px; font-weight: 700; }
  .summary-line .open strong { color: #8a4400; }
  .summary-line .closed strong { color: #0f5c2b; }
  .summary-line[hidden] { display: none; }

  .empty-hero {
    text-align: center; padding: 60px 20px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 14px;
  }
  .empty-hero .emoji { font-size: 64px; margin-bottom: 12px; }
  .empty-hero h2 { margin: 0 0 6px; font-size: 18px; }
  .empty-hero p { margin: 0; color: var(--ink-3); font-size: 13px; }
</style>
</head>
<body class="lang-ja">

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-title">
      <span class="brand">SHOJIKI</span>
      <span class="sub" style="font-weight:600;color:var(--ink)">SH-J001</span>
      <span class="sub ja-only">返品一覧</span>
      <span class="sub zh-only">退货列表</span>
    </div>
    <div class="hdr-meta">
      <div class="lang-toggle">
        <button data-lang="ja" class="active">日本語</button>
        <button data-lang="zh">中文</button>
      </div>
    </div>
  </div>
</header>

<nav class="topnav">
  <a href="./"             class="tn-item"><span class="ja-only">🏠 TOP</span><span class="zh-only">🏠 总览</span></a>
  <a href="./defects.html" class="tn-item"><span class="ja-only">🔧 不具合</span><span class="zh-only">🔧 故障</span></a>
  <a href="./returns.html" class="tn-item active"><span class="ja-only">📦 返品</span><span class="zh-only">📦 退货</span></a>
  <a href="./feedback.html" class="tn-item"><span class="ja-only">💬 お客様の声</span><span class="zh-only">💬 客户反馈</span></a>
</nav>

<main id="app" style="max-width:960px">

  <div id="summary-line" class="summary-line" hidden>
    <div class="open">
      <strong id="count-open">—</strong>
      <span class="ja-only">未対応</span><span class="zh-only">未处理</span>
    </div>
    <div class="closed">
      <strong id="count-closed">—</strong>
      <span class="ja-only">対応済み</span><span class="zh-only">已处理</span>
    </div>
  </div>

  <div id="issue-list"></div>

  <div id="empty" class="empty-hero" hidden>
    <div class="emoji">📭</div>
    <h2><span class="ja-only">まだ返品はありません</span><span class="zh-only">还没有退货记录</span></h2>
    <p>
      <span class="ja-only">返品が登録されると、ここに一覧で表示されます</span>
      <span class="zh-only">退货登记后会在此处显示列表</span>
    </p>
  </div>

</main>

<div id="img-lightbox" class="img-lightbox"><img id="img-lightbox-img" src="" alt=""></div>

<script>
const PRODUCT = "sh-j001";
const REPO = "eda0825-spec/shojiki-rakuten-stats";
const BRANCH = "main";
const LS_LANG_KEY = "shojiki-dashboard-lang";

function applyLang(lang) {
  document.body.classList.toggle("lang-ja", lang === "ja");
  document.body.classList.toggle("lang-zh", lang === "zh");
  document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}
(function initLang() {
  const lang = (typeof localStorage !== "undefined" && localStorage.getItem(LS_LANG_KEY)) || "ja";
  applyLang(lang);
  document.querySelectorAll(".lang-toggle button").forEach(b => {
    b.addEventListener("click", () => {
      const l = b.dataset.lang;
      try { localStorage.setItem(LS_LANG_KEY, l); } catch(e) {}
      applyLang(l);
      reflow();
    });
  });
})();

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Minimal markdown -> HTML for our issue body shape (table + img + link + headings).
function md2html(src) {
  if (!src) return "";
  const lines = String(src).replace(/\r\n/g, "\n").split("\n");
  let out = []; let i = 0;
  while (i < lines.length) {
    const ln = lines[i];

    // Heading (## or ###)
    let h = ln.match(/^(#{2,3})\s+(.+)$/);
    if (h) { out.push(`<h3>${esc(h[2])}</h3>`); i++; continue; }

    // Table: line that contains | and next line is | --- | --- |
    if (ln.includes("|") && i + 1 < lines.length && /^\s*\|?[\s:-]+\|[\s:|-]+$/.test(lines[i+1])) {
      const splitRow = (row) => row.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());
      const head = splitRow(ln);
      i += 2; // skip header + separator
      let rows = [];
      while (i < lines.length && lines[i].includes("|")) {
        rows.push(splitRow(lines[i]));
        i++;
      }
      out.push("<table><thead><tr>" + head.map(c => `<th>${inline(c)}</th>`).join("") + "</tr></thead><tbody>" +
        rows.map(r => "<tr>" + r.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>").join("") +
        "</tbody></table>");
      continue;
    }

    // Blank line
    if (!ln.trim()) { out.push(""); i++; continue; }

    // Image-only line: ![alt](url)
    let img = ln.match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
    if (img) { out.push(`<p><img src="${esc(img[2])}" alt="${esc(img[1])}" loading="lazy"></p>`); i++; continue; }

    // Default: paragraph (collect contiguous non-blank lines)
    let buf = [ln]; i++;
    while (i < lines.length && lines[i].trim() && !lines[i].includes("|") && !/^#{2,3}\s/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    out.push(`<p>${inline(buf.join("<br>"))}</p>`);
  }
  return out.join("\n");
}

// Inline rules: image, link, bold, code
function inline(s) {
  s = esc(s);
  // Restore <br> that we inserted ourselves (esc turned it to &lt;br&gt;)
  s = s.replace(/&lt;br&gt;/g, "<br>");
  // Images: ![alt](url)
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, a, u) => `<img src="${u}" alt="${a}" loading="lazy">`);
  // Links: [text](url) → if it ends with video ext, render <video>
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => {
    if (/\.(mp4|mov|webm|m4v)(\?|$)/i.test(u)) {
      return `<video controls preload="metadata"><source src="${u}"></video>`;
    }
    return `<a href="${u}" target="_blank" rel="noopener">${t}</a>`;
  });
  // Bare image/video URLs
  s = s.replace(/(^|[\s>])(https?:\/\/[^\s<]+\.(?:jpg|jpeg|png|gif|webp))/gi,
    (_, p, u) => `${p}<img src="${u}" loading="lazy" alt="">`);
  s = s.replace(/(^|[\s>])(https?:\/\/[^\s<]+\.(?:mp4|mov|webm|m4v))/gi,
    (_, p, u) => `${p}<video controls preload="metadata"><source src="${u}"></video>`);
  // Bold **text**
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return s;
}

let cachedIssues = null;

function isReturnIssue(i) {
  const labels = (i.labels || []).map(l => String(l).toLowerCase());
  return labels.some(l => l.includes("return"));
}

async function load() {
  try {
    const r = await fetch(`https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/docs/data/defects-merged.json`, { cache: "no-cache" })
      .catch(() => fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/docs/data/defects-merged.json`, { cache: "no-cache" }));
    if (!r.ok) { reflow(); return; }
    const data = await r.json();
    cachedIssues = (data.issues || []).filter(i => i.product === PRODUCT && isReturnIssue(i));
  } catch (e) {
    cachedIssues = [];
  }
  reflow();
}

function reflow() {
  const issues = cachedIssues || [];
  const open = issues.filter(i => i.state === "open");
  const closed = issues.filter(i => i.state !== "open");

  const sumLine = document.getElementById("summary-line");
  const empty = document.getElementById("empty");
  const list = document.getElementById("issue-list");

  if (issues.length === 0) {
    sumLine.hidden = true;
    empty.hidden = false;
    list.innerHTML = "";
    return;
  }
  sumLine.hidden = false;
  empty.hidden = true;
  document.getElementById("count-open").textContent = open.length;
  document.getElementById("count-closed").textContent = closed.length;

  const isJa = document.body.classList.contains("lang-ja");
  const statusLab = (s) => isJa
    ? (s === "open" ? "未対応" : "対応済み")
    : (s === "open" ? "未处理" : "已处理");
  list.innerHTML = issues.slice(0, 100).map(i => `
    <article class="issue-card">
      <div class="head">
        <h3>${esc(i.title)}</h3>
        <div class="head-meta">
          <span class="issue-tag status-${i.state === "open" ? "open" : "closed"}">${esc(statusLab(i.state))}</span>
          <span>#${i.number}</span>
          <span>${esc((i.updated_at || "").slice(0,10))}</span>
        </div>
      </div>
      <div class="body-md">${md2html(i.body || i.body_excerpt || "")}</div>
    </article>
  `).join("");

  // Lightbox for images
  document.querySelectorAll(".body-md img").forEach(img => {
    img.addEventListener("click", () => {
      const lb = document.getElementById("img-lightbox");
      document.getElementById("img-lightbox-img").src = img.src;
      lb.classList.add("open");
    });
  });
}

document.getElementById("img-lightbox").addEventListener("click", e => {
  e.currentTarget.classList.remove("open");
});

load();
</script>

</body>
</html>
