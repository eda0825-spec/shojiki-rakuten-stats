<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHOJIKI SH-J002 不具合一覧</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="./simple.css">
<style>
  .big-add {
    display: inline-block;
    background: #d93b3b; color: #fff;
    padding: 16px 28px; border-radius: 12px;
    font-size: 16px; font-weight: 700;
    text-decoration: none;
    margin-bottom: 24px;
  }
  .big-add:hover { background: #b32626; color: #fff; text-decoration: none; }

  .empty-hero {
    text-align: center; padding: 60px 20px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 14px;
  }
  .empty-hero .emoji { font-size: 64px; margin-bottom: 12px; }
  .empty-hero h2 { margin: 0 0 6px; font-size: 18px; }
  .empty-hero p { margin: 0; color: var(--ink-3); font-size: 13px; }

  .issue-card {
    background: #fff; border: 1px solid var(--line);
    border-radius: 10px; padding: 16px 18px;
    margin-bottom: 10px;
    display: block; text-decoration: none; color: inherit;
  }
  .issue-card:hover { border-color: var(--ink); text-decoration: none; }
  .issue-card h3 { margin: 0 0 6px; font-size: 15px; font-weight: 600; }
  .issue-card .meta {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    font-size: 12px; color: var(--ink-3);
  }
  .issue-tag {
    background: #f0f0f3; color: var(--ink-2);
    padding: 2px 8px; border-radius: 999px; font-size: 11px;
  }
  .issue-tag.sev-high { background: #d93b3b; color: #fff; }
  .issue-tag.sev-medium { background: #d98330; color: #fff; }
  .issue-tag.status-open { background: #eef6ff; color: #114178; }
  .issue-tag.status-closed { background: #effaf0; color: #0f5c2b; }

  .summary-line {
    background: #f6f6f8; padding: 12px 18px;
    border-radius: 10px; margin-bottom: 16px;
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 14px;
  }
  .summary-line strong { font-size: 20px; font-weight: 700; }
  .summary-line .open strong { color: #114178; }
  .summary-line .closed strong { color: #0f5c2b; }
</style>
</head>
<body class="lang-ja">

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-title">
      <span class="brand">SHOJIKI</span>
      <span class="sub" style="font-weight:600;color:var(--ink)">SH-J002</span>
      <span class="sub ja-only">不具合一覧</span>
      <span class="sub zh-only">故障列表</span>
    </div>
    <div class="hdr-meta">
      <div class="lang-toggle">
        <button data-lang="ja" class="active">日本語</button>
        <button data-lang="zh">中文</button>
      </div>
      <a href="./" class="ja-only">← レビューに戻る</a>
      <a href="./" class="zh-only">← 返回评论</a>
    </div>
  </div>
</header>

<main id="app" style="max-width:920px">

  <a href="./defects.html" class="big-add">
    <span class="ja-only">＋ 新しい不具合を報告</span><span class="zh-only">＋ 报告新的故障</span>
  </a>

  <div id="summary-line" class="summary-line" hidden>
    <div class="open">
      <strong id="count-open">—</strong>
      <span class="ja-only">対応中</span><span class="zh-only">处理中</span>
    </div>
    <div class="closed">
      <strong id="count-closed">—</strong>
      <span class="ja-only">解決済み</span><span class="zh-only">已解决</span>
    </div>
  </div>

  <div id="issue-list"></div>

  <div id="empty" class="empty-hero" hidden>
    <div class="emoji">📭</div>
    <h2><span class="ja-only">まだ不具合報告はありません</span><span class="zh-only">还没有故障报告</span></h2>
    <p>
      <span class="ja-only">問題が見つかったら上のボタンから報告してください</span>
      <span class="zh-only">发现问题时请点击上方按钮报告</span>
    </p>
  </div>

</main>

<footer class="ftr">
  <p>
    <span class="ja-only">不具合データは <a href="https://github.com/eda0825-spec/shojiki-defects-j002/issues" target="_blank">GitHub</a> で管理</span>
    <span class="zh-only">故障数据由 <a href="https://github.com/eda0825-spec/shojiki-defects-j002/issues" target="_blank">GitHub</a> 管理</span>
  </p>
</footer>

<script>
const PRODUCT = "sh-j002";
const REPO = "eda0825-spec/shojiki-rakuten-stats";
const BRANCH = "main";
const LS_LANG_KEY = "shojiki-dashboard-lang";

function applyLang(lang) {
  document.body.classList.toggle("lang-ja", lang === "ja");
  document.body.classList.toggle("lang-zh", lang === "zh");
  document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}
(function initLang() {
  const lang = (typeof localStorage !== "undefined" && localStorage.getItem(LS_LANG_KEY)) || "ja";
  applyLang(lang);
  document.querySelectorAll(".lang-toggle button").forEach(b => {
    b.addEventListener("click", () => {
      const l = b.dataset.lang;
      try { localStorage.setItem(LS_LANG_KEY, l); } catch(e) {}
      applyLang(l);
      reflow();
    });
  });
})();

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

let cachedIssues = null;

async function load() {
  try {
    const r = await fetch(`https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/docs/data/defects-merged.json`, { cache: "no-cache" })
      .catch(() => fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/docs/data/defects-merged.json`, { cache: "no-cache" }));
    if (!r.ok) { reflow(); return; }
    const data = await r.json();
    cachedIssues = (data.issues || []).filter(i => i.product === PRODUCT);
  } catch (e) {
    cachedIssues = [];
  }
  reflow();
}

function reflow() {
  const issues = cachedIssues || [];
  const open = issues.filter(i => i.state === "open");
  const closed = issues.filter(i => i.state !== "open");

  const sumLine = document.getElementById("summary-line");
  const empty = document.getElementById("empty");
  const list = document.getElementById("issue-list");

  if (issues.length === 0) {
    sumLine.hidden = true;
    empty.hidden = false;
    list.innerHTML = "";
    return;
  }
  sumLine.hidden = false;
  empty.hidden = true;
  document.getElementById("count-open").textContent = open.length;
  document.getElementById("count-closed").textContent = closed.length;

  const isJa = document.body.classList.contains("lang-ja");
  const statusLab = (s) => isJa
    ? (s === "open" ? "対応中" : "解決済み")
    : (s === "open" ? "处理中" : "已解决");
  const sevLab = (s) => {
    const map = isJa
      ? { high: "深刻度 高", medium: "深刻度 中", low: "深刻度 低" }
      : { high: "严重度 高", medium: "严重度 中", low: "严重度 低" };
    return map[s] || "";
  };
  list.innerHTML = issues.slice(0, 50).map(i => `
    <a href="${esc(i.url)}" target="_blank" class="issue-card">
      <h3>${esc(i.title)}</h3>
      <div class="meta">
        <span class="issue-tag status-${i.state === "open" ? "open" : "closed"}">${esc(statusLab(i.state))}</span>
        ${i.severity ? `<span class="issue-tag sev-${esc(i.severity)}">${esc(sevLab(i.severity))}</span>` : ""}
        ${(i.areas || []).slice(0, 3).map(a => `<span class="issue-tag">${esc(a)}</span>`).join("")}
        <span style="margin-left:auto">#${i.number} ・ ${esc((i.updated_at || "").slice(0,10))} ・ 💬 ${i.comments || 0}</span>
      </div>
    </a>
  `).join("");
}

load();
</script>

</body>
</html>
