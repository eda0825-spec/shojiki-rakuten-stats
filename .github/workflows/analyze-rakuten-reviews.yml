name: Analyze Rakuten Reviews (legacy)

# 旧スクリプト。新しい update-reviews.yml に役割を移譲したので schedule は無効化。
# 必要な時だけ手動実行できるよう workflow_dispatch のみ残す。
on:
  workflow_dispatch:
    inputs:
      item_path:
        description: 'Item path under /item/1/, e.g. 437323_10000000'
        required: false
        default: '437323_10000000'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape and analyze reviews
        run: python3 analyze-rakuten-reviews.py
        env:
          REVIEW_ITEM_PATH: ${{ github.event.inputs.item_path || '437323_10000000' }}
          REVIEW_MAX_PAGES: '100'
          REVIEW_SLEEP_SEC: '1.5'

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain rakuten-reviews.json rakuten-reviews-analysis.json)" ]]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add rakuten-reviews.json rakuten-reviews-analysis.json
            git commit -m "chore: update rakuten reviews $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
