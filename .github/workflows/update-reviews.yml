name: Update Reviews (fetch + categorize)

# 楽天レビューを取得 → Claude で分類・要約・中国語翻訳 → main にコミット。
# docs/ ディレクトリ (GitHub Pages) からこのリポの JSON を参照しているので、
# コミットされた時点でダッシュボードが更新される。

concurrency:
  group: update-reviews
  cancel-in-progress: false

on:
  schedule:
    # 毎時 (XX:00 UTC = XX+9 JST) — レビューを ほぼリアルタイム 取得
    - cron: '0 * * * *'
    # 毎週月曜 05:00 JST (= 20:00 UTC 日曜) — full_rescan で 削除レビューを検出
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      full_rescan:
        description: 'reviews: ignore cache and refetch every page (true/false)'
        required: false
        default: 'false'
      categorize_only:
        description: 'fetchをスキップしてcategorizeだけ実行 (true/false)'
        required: false
        default: 'false'
      categorize_full:
        description: 'categorize: ignore existing and re-classify ALL (true/false)'
        required: false
        default: 'false'
      max_categorize:
        description: 'カテゴリ分類の1回あたり最大件数 (default 200)'
        required: false
        default: '200'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Rakuten reviews (J001 + J002)
        if: ${{ github.event.inputs.categorize_only != 'true' }}
        run: python3 fetch-reviews.py
        env:
          # full_rescan = manual override OR weekly cron (Sun 20:00 UTC = Mon 05:00 JST)
          REVIEW_FULL_RESCAN: ${{ (github.event.inputs.full_rescan == 'true' || github.event.schedule == '0 20 * * 0') && '1' || '0' }}
          REVIEW_SLEEP_SEC: '1.5'
          REVIEW_MAX_PAGES: '200'

      - name: Categorize reviews via Claude API
        run: python3 categorize-reviews.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: 'claude-sonnet-4-6'
          CATEGORIZE_BATCH_SIZE: '8'
          CATEGORIZE_MAX_REVIEWS: ${{ github.event.inputs.max_categorize || '200' }}
          CATEGORIZE_FULL_RESCAN: ${{ github.event.inputs.categorize_full == 'true' && '1' || '0' }}

      - name: Commit and push if changed
        run: |
          set -e
          changed=$(git status --porcelain reviews-*.json categorized-*.json | wc -l)
          if [ "$changed" -eq 0 ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reviews-*.json categorized-*.json
          git commit -m "chore: update rakuten reviews + categorization $(date -u +%Y-%m-%d)"
          # Retry on push race: if remote moved during the long categorize step,
          # rebase our single commit on top and retry up to 5 times.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, pulling --rebase and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "ERROR: push failed after 5 retries"
          exit 1

      - name: Upload categorized JSON as artifact (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-data-${{ github.run_id }}
          path: |
            reviews-*.json
            categorized-*.json
          retention-days: 14
