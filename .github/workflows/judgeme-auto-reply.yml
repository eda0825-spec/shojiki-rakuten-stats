name: Judge.me Auto Reply

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate replies but do not POST)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run auto-reply
        run: python3 judgeme-auto-reply.py
        env:
          JUDGE_ME_API_TOKEN: ${{ secrets.JUDGE_ME_API_TOKEN }}
          JUDGE_ME_SHOP_DOMAIN: ${{ secrets.JUDGE_ME_SHOP_DOMAIN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain judgeme-processed.json)" ]]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add judgeme-processed.json
            git commit -m "chore: update judgeme processed state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit."
          fi
